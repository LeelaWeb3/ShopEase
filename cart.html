<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ShopEase | Shopping Cart</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">


<script src="js/products.js"></script>
<script src="js/cart.js"></script>
<script src="js/main.js"></script>


</head>



<body>

    <!-- ===== HEADER ===== -->

    <header>

        <nav class="navbar">

            <div class="logo">
                <a href="index.html">ShopEase</a>
            </div>

            <button class="menu-btn"
                    id="menuBtn"
                    aria-label="Toggle navigation">

                ☰

            </button>

            <ul class="nav-links" id="navLinks">

                <li>

                    <a href="index.html">

                        Home

                    </a>

                </li>

                <li>

                    <a href="products.html">

                        Products

                    </a>

                </li>

                <li>

                    <a href="cart.html">

                        Cart

                        <span
                            class="cart-badge"
                            id="cart-count">

                            0

                        </span>

                    </a>

                </li>

            </ul>

            <button
                id="themeToggle"
                class="theme-btn">

                🌙

            </button>

        </nav>

    </header>

    <!-- ===== MAIN ===== -->

    <main>

        <section class="cart-section">

            <h2>

                Shopping Cart

            </h2>

            <!-- Cart Items -->

            <div
                id="cartContainer">

            </div>

            <!-- Empty Cart -->

            <div
              id="emptyCart"
              class="empty-cart hidden">

                <h3>

                    Your cart is empty.

                </h3>

                <p>

                    Start shopping now!

                </p>

                <a
                    href="products.html"
                    class="btn">

                    Continue Shopping

                </a>

            </div>

            <!-- Cart Summary -->

            <div
                class="cart-summary">

                <h3>

                    Order Summary

                </h3>

                <p>

                    Subtotal :

                    ₹<span id="subtotal">

                        0

                    </span>

                </p>

                <p>

                    Tax (10%) :

                    ₹<span id="tax">

                        0

                    </span>

                </p>

                <h2>

                    Total :

                    ₹<span id="total">

                        0

                    </span>

                </h2>

                <a
                    href="checkout.html"
                    class="btn">

                    Proceed to Checkout

                </a>

            </div>

        </section>

    </main>

    <!-- ===== FOOTER ===== -->

    <footer>

        <p>

            © 2026 ShopEase.
            All Rights Reserved.

        </p>

    </footer>



</body>

</html>
